name: walletflow
description: "Personal Finance - Expense, Budget and Loan Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  get: ^4.6.6
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Cloud Database & Auth
  supabase_flutter: ^2.5.4
  google_sign_in: ^6.2.2
  
  # Charts
  fl_chart: ^0.69.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  file_saver: ^0.2.14
  
  # Environment
  flutter_dotenv: ^5.2.1
  
  # HTTP
  dio: ^5.7.0
  
  # Connectivity
  connectivity_plus: ^6.1.0
  google_fonts: ^8.0.2
  dynamic_color: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/icon.png
  
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf

# Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "#FFFFFF"
  web:
    generate: false

# Native Splash Configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/icon.png
  color_dark: "#0F172A"
  image_dark: assets/icon/icon.png
  android_12:
    color: "#FFFFFF"
    image: assets/icon/icon.png
    icon_background_color: "#FFFFFF"
  web: false
  android: true
  ios: true
  android_gravity: center
  fullscreen: false
